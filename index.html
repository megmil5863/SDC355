<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal portfolio homepage" />
  <title>My Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      line-height: 1.6;
      background: white;
      color: black;
    }

    .dark-mode {
      background: #121212;
      color: white;
    }

    header {
      background: #222;
      color: white;
      padding: 1rem;
    }

    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    #welcome {
      background: #f4f4f4;
      padding: 1rem;
      text-align: center;
      font-size: 1.2rem;
    }

    section {
      padding: 2rem;
    }

    .projects img {
      width: 200px;
      height: 130px;
      object-fit: cover;
      margin-right: 10px;
      border: 1px solid #ccc;
    }

    form {
      display: flex;
      flex-direction: column;
      max-width: 400px;
    }

    input, textarea {
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 10px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
    }

    .featured-box {
      border: 2px solid #222;
      padding: 15px;
      margin-bottom: 20px;
      background: #f4f4f4;
    }

    .dark-mode .featured-box {
      background: #2c2c2c;
      color: white;
    }

    .toggle-container {
      padding: 10px;
      text-align: right;
      background: #ddd;
    }
  </style>
</head>

<body>

  <!-- Dark Mode Toggle -->
  <div class="toggle-container">
    <label>
      <input type="checkbox" id="darkMode">
      Dark Mode
    </label>
  </div>

  <!-- Welcome -->
  <div id="welcome">Welcome!</div>

  <!-- Navigation -->
  <header>
    <nav>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- ABOUT -->
  <section id="about">
    <h1>About Me</h1>

    <p>
      Hello! I'm a web developer passionate about building clean websites.
    </p>

    <h2>Skills</h2>
    <ul id="skillsList"></ul>
  </section>

  <!-- FEATURED CONTENT -->
  <section id="featured">
    <h1>Featured Content</h1>

    <div id="universityResources" class="featured-box">
      <h2>University Resources</h2>
      <a href="https://www.ecpi.edu/" target="_blank">ECPI University</a><br>
      <a href="https://my.ecpi.edu/" target="_blank">Student Portal</a>
    </div>

    <div id="personalProjects" class="featured-box">
      <h2>Personal Projects</h2>
      <a href="https://github.com/yourusername" target="_blank">
        GitHub Profile
      </a>
    </div>
  </section>

  <!-- PROJECTS -->
  <section id="projects" class="projects">
    <h1>Projects</h1>

    <a href="#"><img src="https://via.placeholder.com/200x130?text=Project+1"></a>
    <a href="#"><img src="https://via.placeholder.com/200x130?text=Project+2"></a>
    <a href="#"><img src="https://via.placeholder.com/200x130?text=Project+3"></a>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h1>Contact</h1>

    <form>
      <input type="text" name="name" placeholder="Your Name" required />
      <input type="email" name="email" placeholder="Your Email" required />
      <input type="text" name="subject" placeholder="Subject" required />
      <textarea name="message" rows="5" placeholder="Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>
  <script>
    // =========================
    // Welcome Message
    // =========================
    const userName = prompt("What is your name?");
    const welcomeMessage = document.getElementById("welcome");

    if (userName && userName.trim() !== "") {
      welcomeMessage.textContent = `Welcome, ${userName}!`;
    } else {
      welcomeMessage.textContent = "Welcome to my portfolio!";
    }

    // =========================
    // Skills Loop
    // =========================
    const skills = ["HTML", "CSS", "JavaScript", "Git", "GitHub"];
    const skillsList = document.getElementById("skillsList");

    skills.forEach(skill => {
      const li = document.createElement("li");
      li.textContent = skill;
      skillsList.appendChild(li);
    });

    // =========================
    // Featured Content Logic
    // =========================
    const projectCount = document.querySelectorAll(".projects a").length;

    const universityResources = document.getElementById("universityResources");
    const personalProjects = document.getElementById("personalProjects");

    if (projectCount < 3) {
      universityResources.style.display = "block";
      personalProjects.style.display = "block";
    } else {
      universityResources.style.display = "none";
      personalProjects.style.display = "block";
    }

    // =========================
    // Dark Mode Toggle
    // =========================
    const darkMode = document.getElementById("darkMode");

    darkMode.addEventListener("change", function () {
      document.body.classList.toggle("dark-mode");
    });

    // =========================
    // Contact Form Button Interaction
    // =========================
    const form = document.querySelector("form");
    const button = form.querySelector("button");

    button.addEventListener("click", function (event) {
      event.preventDefault();

      const name = document.querySelector('input[name="name"]').value;

      if (name.trim() !== "") {
        alert(`Thank you, ${name}, your message has been sent!`);
      } else {
        alert("Thank you! Your message has been sent!");
      }
    });
  </script>

</body>
</html>
